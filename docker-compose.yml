version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: my_bot_db
    networks:
      - backend_network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend_network

  # ИИ-пилот
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend_network
   n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
    "5678:5678"
    volumes:
     - ./n8n_data:/home/node/.n8n
    networks:
     - backend_network
networks:
  backend_network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
